<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>维度坐标：心理占星整合引擎</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --text-color: #333;
        }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 20px 0;
        }
        .container { width: 95%; max-width: 550px; }
        .card {
            background: rgba(255, 255, 255, 0.98);
            color: var(--text-color);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
        h1 { text-align: center; font-size: 20px; color: #1a1a1b; margin-bottom: 25px; letter-spacing: 1px; }

        /* 模式切换器 */
        .mode-switcher {
            display: flex;
            background: #eee;
            border-radius: 10px;
            margin-bottom: 25px;
            padding: 4px;
        }
        .mode-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: none;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            color: #777;
            transition: all 0.3s;
        }
        .mode-btn.active { background: #fff; color: var(--accent-color); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .form-section { display: none; }
        .form-section.active { display: block; }

        .form-group { margin-bottom: 15px; }
        label { font-size: 13px; font-weight: bold; color: #555; display: block; margin-bottom: 6px; }
        input, select {
            width: 100%; padding: 12px;
            border: 1px solid #ddd; border-radius: 8px;
            font-size: 14px; box-sizing: border-box;
        }
        .row { display: flex; gap: 10px; }
        .row > div { flex: 1; }

        button.btn-main {
            width: 100%; padding: 16px; margin-top: 15px;
            background: linear-gradient(135deg, #2c3e50, #3498db);
            color: white; border: none; border-radius: 10px;
            font-size: 16px; font-weight: bold; cursor: pointer;
        }

        #loading { display: none; text-align: center; padding: 20px; }
        #result-box { display: none; margin-top: 20px; }
        .ai-text { line-height: 1.8; font-size: 14px; white-space: pre-wrap; color: #2c3e50; }

        .watermark {
            text-align: center; font-size: 11px; color: #999; margin-top: 20px;
            border-top: 1px solid #eee; padding-top: 15px; display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card" id="capture-area">
        <h1>🌌 深度心理与星盘整合解析</h1>

        <!-- 昵称通用输入 -->
        <div class="form-group">
            <label>昵称 / 探索者代号</label>
            <input type="text" id="nickname" placeholder="如何称呼您？" maxlength="15">
        </div>

        <!-- 模式选择 -->
        <div class="mode-switcher">
            <button class="mode-btn active" onclick="switchMode('simple')">入门模式</button>
            <button class="mode-btn" onclick="switchMode('precision')">精准模式</button>
        </div>

        <!-- 入门模式表单 -->
        <div id="simple-section" class="form-section active">
            <div class="row">
                <div class="form-group">
                    <label>MBTI 类型</label>
                    <select id="mbti">
                        <option value="INTJ">INTJ</option><option value="INTP">INTP</option>
                        <option value="ENTJ">ENTJ</option><option value="ENTP">ENTP</option>
                        <option value="INFJ">INFJ</option><option value="INFP">INFP</option>
                        <option value="ENFJ">ENFJ</option><option value="ENFP">ENFP</option>
                        <option value="ISTJ">ISTJ</option><option value="ISFJ">ISFJ</option>
                        <option value="ESTJ">ESTJ</option><option value="ESFJ">ESFJ</option>
                        <option value="ISTP">ISTP</option><option value="ISFP">ISFP</option>
                        <option value="ESTP">ESTP</option><option value="ESFP">ESFP</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>太阳星座</label>
                    <select id="zodiac">
                        <option value="白羊座">白羊座</option><option value="金牛座">金牛座</option>
                        <option value="双子座">双子座</option><option value="巨蟹座">巨蟹座</option>
                        <option value="狮子座">狮子座</option><option value="处女座">处女座</option>
                        <option value="天秤座">天秤座</option><option value="天蝎座">天蝎座</option>
                        <option value="射手座">射手座</option><option value="摩羯座">摩羯座</option>
                        <option value="水瓶座">水瓶座</option><option value="双鱼座">双鱼座</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 精准模式表单 -->
        <div id="precision-section" class="form-section">
            <div class="form-group">
                <label>出生日期 (公历)</label>
                <input type="date" id="birth-date">
            </div>
            <div class="row">
                <div class="form-group">
                    <label>出生具体时间</label>
                    <input type="time" id="birth-time">
                </div>
                <div class="form-group">
                    <label>出生地点 (城市/省份)</label>
                    <input type="text" id="birth-place" placeholder="如：上海、东京">
                </div>
            </div>
            <p style="font-size: 11px; color: #888;">* 算法将自动根据经纬度推算真太阳时与上升点。</p>
        </div>

        <button class="btn-main" onclick="startAnalysis()">启动深度解析 🏛️</button>

        <div id="loading">
            <div style="font-size: 24px;">⌛</div>
            正在检索星历表并构建心理原型...
        </div>

        <div id="result-box">
            <div class="ai-text" id="ai-content"></div>
            <div class="watermark" id="watermark">
                探索者：<span id="res-nickname"></span> | 维度整合解析报告
            </div>
        </div>
    </div>

    <div style="margin-top: 15px; display: none;" id="share-action">
        <button style="width: 100%; padding: 12px; background: #fff; color: #2c3e50; border: 2px solid #2c3e50; border-radius: 10px; cursor: pointer; font-weight: bold;" onclick="generatePoster()">📸 保存深度分析海报</button>
    </div>
</div>

<script>
    let currentMode = 'simple';
    const WORKER_URL = "https://mbti-api.jackwilsonbuddy.workers.dev"; // 替换为你的 Worker 地址

    function switchMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById(mode + '-section').classList.add('active');
    }

    async function startAnalysis() {
        const nickname = document.getElementById('nickname').value || '匿名探索者';
        let payload = { mode: currentMode, nickname };

        if (currentMode === 'simple') {
            payload.mbti = document.getElementById('mbti').value;
            payload.zodiac = document.getElementById('zodiac').value;
        } else {
            payload.birthDate = document.getElementById('birth-date').value;
            payload.birthTime = document.getElementById('birth-time').value;
            payload.birthPlace = document.getElementById('birth-place').value;
            if (!payload.birthDate || !payload.birthPlace) {
                alert('请填写完整的出生数据'); return;
            }
        }

        document.querySelector('.btn-main').style.display = 'none';
        document.getElementById('loading').style.display = 'block';

        try {
            const response = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await response.json();

            document.getElementById('loading').style.display = 'none';
            document.getElementById('result-box').style.display = 'block';
            document.getElementById('res-nickname').innerText = nickname;
            document.getElementById('share-action').style.display = 'block';

            typeWriter(data.result, 'ai-content', 15);
        } catch (e) {
            alert('解析失败，请检查网络。');
            location.reload();
        }
    }

    function typeWriter(text, elementId, speed) {
        let i = 0;
        const el = document.getElementById(elementId);
        el.innerHTML = "";
        function type() {
            if (i < text.length) {
                el.innerHTML += text.charAt(i) === '\n' ? '<br>' : text.charAt(i);
                i++;
                setTimeout(type, speed);
            } else {
                document.getElementById('watermark').style.display = 'block';
            }
        }
        type();
    }

    function generatePoster() {
        html2canvas(document.getElementById('capture-area'), { scale: 2, backgroundColor: "#fff" }).then(canvas => {
            const link = document.createElement('a');
            link.download = `星盘解析_${new Date().getTime()}.jpg`;
            link.href = canvas.toDataURL("image/jpeg", 0.9);
            link.click();
        });
    }
</script>
</body>
</html>
